<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../assets/css/book-appointment.css"> <!-- Link the same CSS file for consistent styling -->
  <title>Soothify - Reset Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
</head>

<body>
  <nav>
    <a href="index.html" class="logo-container">
      <img src="../assets/images/mental-health.png" alt="Soothify Logo" />
      <span class="logo-text">Soothify</span>
    </a>
    <div class="nav-links">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="considering-therapy.html">Considering Therapy</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li>
          <a href="book-appointment.html" class="appointment-btn">
            <i class="fa-solid fa-phone" style="margin-right: 5px;"></i> Book an Appointment </a>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <!-- Reset Password Form -->
    <div class="main-container">
        <div class="forgot-password-container">
            <h1>Reset Your Password</h1>
            <p>Enter your new password below.</p>
            <form action="../../backend/php/reset-password.php" method="POST">
              <input type="password" name="password" placeholder="Enter new password" required />
              <input type="password" name="confirm_password" placeholder="Confirm new password" required />
              <button type="submit" name="reset_password">RESET PASSWORD</button>
            </form>
            <p>Remembered your password? <a href="book-appointment.html">Sign In</a></p>
        </div>
    </div>
  </div>

  <script>
    // Get token from URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // You can use AJAX here to verify the token and display the reset form if valid
    if (token) {
        // Make an AJAX call to verify the token and its expiration
        fetch('../../backend/php/verify-token.php?token=' + token)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Token is valid, show the reset form
                    document.getElementById('resetForm').style.display = 'block';
                } else {
                    // Token is invalid or expired, show an error message
                    alert('Invalid or expired token.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
    } else {
        alert('No token found.');
    }
</script>
</body>
</html>
